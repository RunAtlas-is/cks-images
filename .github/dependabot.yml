version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/index"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
    commit-message:
      prefix: "chore(ci)"
