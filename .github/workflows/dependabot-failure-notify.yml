name: Dependabot failure notify

# Self-contained copy of the org Dependabot failure notifier. This repository
# is public and GitHub does not allow a public repository to call reusable
# workflows or actions that live in the private RunAtlas-is/.github repository,
# so the caller pattern used by the private repos cannot resolve here. The
# script is a verbatim vendor of
# RunAtlas-is/.github/.github/actions/dependabot-failure-notify; keep the two
# in sync when the notifier changes.
#
# Manual test: run from the Actions tab (workflow_dispatch) with `test`
# checked. That posts a clearly labeled test message without <!channel> so
# nobody gets tagged, verifying the token, channel, and posting mechanics.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      test:
        description: Post a test message (no channel tag) to verify posting.
        required: true
        type: boolean
        default: true

permissions:
  actions: read
  contents: read
  pull-requests: read

env:
  SLACK_CHANNEL_ID: C09DCAPTS3H

jobs:
  notify:
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'failure' &&
       github.event.workflow_run.actor.login == 'dependabot[bot]') ||
      (github.event_name == 'workflow_dispatch' && inputs.test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Notify Slack
        env:
          GH_TOKEN: ${{ github.token }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          CI_WORKFLOWS: "CI"
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: bun .github/scripts/dependabot-failure-notify.ts
