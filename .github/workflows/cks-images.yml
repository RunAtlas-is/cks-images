name: CKS images

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      k8s_minor:
        description: Kubernetes minor, for example 1.33. Leave blank to build the active matrix.
        required: false
        type: string
      force_rebuild:
        description: Rebuild even if the object already exists.
        required: false
        type: boolean
        default: false
      register_cloudstack:
        description: Register published images in CloudStack after Pages deploy. Requires the cloudstack-registration environment.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: cks-images
  cancel-in-progress: false

env:
  AWS_ENDPOINT_URL: ${{ vars.S3_ENDPOINT_URL || 'https://s3.runatlas.is' }}
  BUCKET_NAME: ${{ vars.S3_BUCKET || 'atlas-static-assets' }}
  S3_BUCKET: ${{ vars.S3_BUCKET || 'atlas-static-assets' }}
  S3_ENDPOINT_URL: ${{ vars.S3_ENDPOINT_URL || 'https://s3.runatlas.is' }}
  S3_PREFIX: ${{ vars.S3_PREFIX || 'cks/' }}
  ARTIFACT_BASE_URL: ${{ vars.ARTIFACT_BASE_URL || 'https://s3.runatlas.is/atlas-static-assets' }}
  SITE_BASE_URL: ${{ vars.SITE_BASE_URL || 'https://runatlas-is.github.io/cks-images' }}
  DOCS_URL: ${{ vars.DOCS_URL || 'https://github.com/RunAtlas-is/cks-images/blob/main/docs/operations.md' }}
  SIGNING_KEY: ${{ vars.GPG_SIGNING_KEY || 'artifacts@runatlas.is' }}
  SIGNING_FINGERPRINT: ${{ vars.GPG_SIGNING_FINGERPRINT || '4C2D72FDDEF77A5CC4A7D2C421CA4588DCB6991E' }}
  CNI_VERSION: ${{ vars.CNI_VERSION || '1.6.2' }}
  CRICTL_VERSION: ${{ vars.CRICTL_VERSION || '1.33.0' }}
  HEADLAMP_VERSION: ${{ vars.HEADLAMP_VERSION || '0.25.0' }}
  CNI_YAML_URL: ${{ vars.CNI_YAML_URL || 'https://raw.githubusercontent.com/projectcalico/calico/v3.29.0/manifests/calico.yaml' }}

jobs:
  minors:
    runs-on: ubuntu-24.04
    outputs:
      list: ${{ steps.resolve.outputs.list }}
    steps:
      - name: Resolve active Kubernetes minors
        id: resolve
        env:
          REQUESTED_MINOR: ${{ github.event.inputs.k8s_minor }}
        run: |
          set -euo pipefail
          if [[ -n "${REQUESTED_MINOR}" ]]; then
            jq -cn --arg minor "${REQUESTED_MINOR}" '[$minor]' | sed 's/^/list=/' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          today="$(date -u +%Y-%m-%d)"
          json="$(curl -fsSL --max-time 15 https://endoflife.date/api/kubernetes.json)"
          minors="$(jq -c --arg today "$today" '
            [.[] | select(.eol != null and .eol >= $today) | .cycle]
            | sort_by(split(".") | map(tonumber))
            | reverse[0:4]
          ' <<<"$json")"
          if [[ "$minors" == "[]" ]]; then
            echo "No active Kubernetes minors resolved from endoflife.date" >&2
            exit 1
          fi
          echo "list=$minors" >> "$GITHUB_OUTPUT"
          echo "Selected minors: $minors"

  build:
    needs: minors
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        minor: ${{ fromJson(needs.minors.outputs.list) }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID || secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY || secrets.AWS_SECRET_ACCESS_KEY }}
      GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      FORCE_REBUILD: ${{ github.event.inputs.force_rebuild || 'false' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate required secrets
        run: |
          set -euo pipefail
          test -n "${AWS_ACCESS_KEY_ID}" || { echo "S3_ACCESS_KEY_ID is missing" >&2; exit 1; }
          test -n "${AWS_SECRET_ACCESS_KEY}" || { echo "S3_SECRET_ACCESS_KEY is missing" >&2; exit 1; }
          test -n "${GPG_PRIVATE_KEY_B64}" || { echo "GPG_PRIVATE_KEY_B64 is missing" >&2; exit 1; }

      - name: Install prerequisites
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates containerd curl genisoimage gnupg jq unzip
          # The runner image ships the AWS CLI; fail loudly if that changes
          # rather than installing an unverified build.
          command -v aws >/dev/null 2>&1 || { echo "aws CLI is missing from the runner image" >&2; exit 1; }

      - name: Import signing key
        run: |
          set -euo pipefail
          export GNUPGHOME="${RUNNER_TEMP}/gnupg"
          mkdir -m 700 -p "$GNUPGHOME"
          printf '%s' "${GPG_PRIVATE_KEY_B64}" | base64 -d | gpg --batch --import
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"

      - name: Ensure containerd is running
        run: |
          set -euo pipefail
          if [[ ! -S /run/containerd/containerd.sock ]]; then
            sudo systemctl start containerd
          fi
          sudo ctr version

      - name: Resolve latest patch for ${{ matrix.minor }}
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          latest="$(
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              "https://api.github.com/repos/kubernetes/kubernetes/releases?per_page=100" \
            | jq -r --arg minor "v${{ matrix.minor }}." '
                [.[] | select(.prerelease == false) | select(.tag_name | startswith($minor))]
                | sort_by(.tag_name | ltrimstr("v") | split(".") | map(tonumber))
                | last
                | .tag_name
              ' \
            | tr -d 'v'
          )"
          if [[ -z "$latest" || "$latest" == "null" ]]; then
            echo "No stable release found for ${{ matrix.minor }}" >&2
            exit 1
          fi
          prefix="${S3_PREFIX#/}"
          if [[ -n "$prefix" && "$prefix" != */ ]]; then
            prefix="${prefix}/"
          fi
          echo "k8s_version=$latest" >> "$GITHUB_OUTPUT"
          echo "object_key=${prefix}setup-v${latest}-calico-amd64-x86_64.iso" >> "$GITHUB_OUTPUT"

      - name: Check existing object
        id: existing
        run: |
          set -euo pipefail
          if [[ "${FORCE_REBUILD}" == "true" ]]; then
            echo "already_built=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          set +e
          out="$(aws --endpoint-url "${AWS_ENDPOINT_URL}" s3api head-object \
            --bucket "${BUCKET_NAME}" --key "${{ steps.version.outputs.object_key }}" 2>&1)"
          rc=$?
          set -e
          if [[ $rc -eq 0 ]]; then
            echo "already_built=true" >> "$GITHUB_OUTPUT"
          elif [[ "$out" == *"Not Found"* || "$out" == *"NoSuchKey"* || "$out" == *"404"* ]]; then
            echo "already_built=false" >> "$GITHUB_OUTPUT"
          else
            echo "head-object failed for ${{ steps.version.outputs.object_key }} (rc=$rc): $out" >&2
            exit 1
          fi

      - name: Build and upload ISO
        if: steps.existing.outputs.already_built != 'true'
        env:
          K8S_VERSION: ${{ steps.version.outputs.k8s_version }}
        run: ./scripts/build-iso.sh

      - name: Record built ISO digests
        if: steps.existing.outputs.already_built != 'true'
        run: |
          set -euo pipefail
          # Provenance record for the sign job: only ISOs listed here (or
          # already attested by a signed CHECKSUM set) may be signed.
          mkdir -p "${RUNNER_TEMP}/built-digests"
          out="${RUNNER_TEMP}/built-digests/${{ matrix.minor }}.txt"
          for iso in output/*.iso; do
            digest="$(awk '{print $1}' "${iso}.sha256")"
            printf '%s  %s\n' "$digest" "$(basename "$iso")" >> "$out"
          done
          test -s "$out" || { echo "No built ISO digests recorded" >&2; exit 1; }
          cat "$out"

      - name: Upload built ISO digests
        if: steps.existing.outputs.already_built != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: built-digests-${{ matrix.minor }}
          path: ${{ runner.temp }}/built-digests/
          if-no-files-found: error
          retention-days: 1

      - name: Validate ISO checksum object
        run: |
          set -euo pipefail
          checksum="$(
            aws --endpoint-url "${AWS_ENDPOINT_URL}" s3 cp \
              "s3://${BUCKET_NAME}/${{ steps.version.outputs.object_key }}.sha256" - \
            | awk '{print $1}'
          )"
          if [[ ! "$checksum" =~ ^[0-9a-fA-F]{64}$ ]]; then
            echo "Invalid checksum for ${{ steps.version.outputs.object_key }}: $checksum" >&2
            exit 1
          fi

  sign:
    needs: build
    runs-on: ubuntu-24.04
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID || secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY || secrets.AWS_SECRET_ACCESS_KEY }}
      GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install prerequisites
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl gnupg jq
          # The runner image ships the AWS CLI; fail loudly if that changes
          # rather than installing an unverified build.
          command -v aws >/dev/null 2>&1 || { echo "aws CLI is missing from the runner image" >&2; exit 1; }

      - name: Import signing key
        run: |
          set -euo pipefail
          test -n "${AWS_ACCESS_KEY_ID}" || { echo "S3_ACCESS_KEY_ID is missing" >&2; exit 1; }
          test -n "${AWS_SECRET_ACCESS_KEY}" || { echo "S3_SECRET_ACCESS_KEY is missing" >&2; exit 1; }
          test -n "${GPG_PRIVATE_KEY_B64}" || { echo "GPG_PRIVATE_KEY_B64 is missing" >&2; exit 1; }
          export GNUPGHOME="${RUNNER_TEMP}/gnupg"
          mkdir -m 700 -p "$GNUPGHOME"
          printf '%s' "${GPG_PRIVATE_KEY_B64}" | base64 -d | gpg --batch --import
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"

      - name: Download built ISO digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: built-digests-*
          merge-multiple: true
          path: ${{ runner.temp }}/built-digests

      - name: Sign artifacts and regenerate checksums
        env:
          BUILT_DIGESTS_DIR: ${{ runner.temp }}/built-digests
        run: |
          set -euo pipefail
          merged="${RUNNER_TEMP}/built-digests.txt"
          : > "$merged"
          if compgen -G "${BUILT_DIGESTS_DIR}/*.txt" > /dev/null; then
            cat "${BUILT_DIGESTS_DIR}"/*.txt > "$merged"
          fi
          BUILT_DIGESTS_FILE="$merged" ./scripts/sign-artifacts.sh

      - name: Publish signing key to object storage
        run: |
          set -euo pipefail
          aws --endpoint-url "${AWS_ENDPOINT_URL}" s3 cp \
            keys/atlas-cloud-artifact-signing.asc \
            "s3://${BUCKET_NAME}/keys/atlas-cloud-artifact-signing.asc" \
            --content-type "application/pgp-keys" \
            --cache-control "max-age=3600" \
            --only-show-errors

  pages:
    needs: sign
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID || secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY || secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Validate required secrets
        run: |
          set -euo pipefail
          test -n "${AWS_ACCESS_KEY_ID}" || { echo "S3_ACCESS_KEY_ID is missing" >&2; exit 1; }
          test -n "${AWS_SECRET_ACCESS_KEY}" || { echo "S3_SECRET_ACCESS_KEY is missing" >&2; exit 1; }

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Build Pages site
        run: |
          set -euo pipefail
          cd index
          bun install --frozen-lockfile
          bun run build

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: index/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  cloudstack:
    needs: pages
    if: github.event_name == 'workflow_dispatch' && inputs.register_cloudstack
    runs-on: ubuntu-24.04
    environment: cloudstack-registration
    permissions:
      contents: read
    env:
      CLOUDSTACK_ENDPOINT: ${{ vars.CLOUDSTACK_ENDPOINT }}
      CLOUDSTACK_API_KEY: ${{ secrets.CLOUDSTACK_API_KEY }}
      CLOUDSTACK_SECRET_KEY: ${{ secrets.CLOUDSTACK_SECRET_KEY }}
      CLOUDSTACK_ZONE_IDS: ${{ vars.CLOUDSTACK_ZONE_IDS || vars.CLOUDSTACK_ZONE_ID }}
      CKS_MANIFEST_URL: ${{ vars.CKS_MANIFEST_URL }}
      CKS_ARCH: ${{ vars.CKS_ARCH || 'x86_64' }}
      CKS_MIN_CPU: ${{ vars.CKS_MIN_CPU || '2' }}
      CKS_MIN_MEMORY: ${{ vars.CKS_MIN_MEMORY || '2048' }}
      CKS_DIRECT_DOWNLOAD: ${{ vars.CKS_DIRECT_DOWNLOAD || 'false' }}
      GPG_SIGNING_FINGERPRINT: ${{ vars.GPG_SIGNING_FINGERPRINT || '4C2D72FDDEF77A5CC4A7D2C421CA4588DCB6991E' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install prerequisites
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates gnupg python3-pip python3-venv
          mkdir -p .cache
          python3 -m venv .cache/cloudstack-venv
          .cache/cloudstack-venv/bin/python -m pip install cs

      - name: Sync CloudStack supported versions
        run: |
          set -euo pipefail
          test -n "${CLOUDSTACK_ENDPOINT}" || { echo "CLOUDSTACK_ENDPOINT is missing" >&2; exit 1; }
          test -n "${CLOUDSTACK_API_KEY}" || { echo "CLOUDSTACK_API_KEY is missing" >&2; exit 1; }
          test -n "${CLOUDSTACK_SECRET_KEY}" || { echo "CLOUDSTACK_SECRET_KEY is missing" >&2; exit 1; }
          test -n "${CLOUDSTACK_ZONE_IDS}" || { echo "CLOUDSTACK_ZONE_IDS or CLOUDSTACK_ZONE_ID is missing" >&2; exit 1; }
          manifest_url="${CKS_MANIFEST_URL:-${SITE_BASE_URL%/}/manifest.json}"
          .cache/cloudstack-venv/bin/python scripts/sync-cloudstack-supported-versions.py \
            --manifest-url "${manifest_url}" \
            --latest-per-minor \
            --disable-superseded \
            --disable-eol \
            --fail-on-stalled
