name: CI

# Validation gate for every pull request (including Dependabot bumps, which
# auto-merge only after this passes as a required status check) and for pushes
# to main.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install index dependencies
        working-directory: index
        run: bun install --frozen-lockfile

      - name: Typecheck index
        working-directory: index
        run: bunx tsc --noEmit

      - name: Lint shell scripts
        run: |
          set -euo pipefail
          bash -n scripts/*.sh
          shellcheck --severity=warning scripts/*.sh

      - name: Compile Python scripts
        run: python3 -m py_compile scripts/*.py
