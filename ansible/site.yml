---
- name: Provision cks-builder cmk resources
  hosts: localhost
  gather_facts: false
  vars_files:
    - group_vars/all.yml

  pre_tasks:
    - name: Load CloudStack credentials from ~/.cmk/config
      ansible.builtin.command:
        argv:
          - awk
          - -v
          - "section={{ cs_profile }}"
          - 'BEGIN { in_section = 0 } /^\[/ { in_section = ($0 == "[" section "]") } in_section && /^[a-z_]+[[:space:]]*=/ { gsub(/[[:space:]]/, "", $0); print }'
          - "{{ lookup('env', 'HOME') }}/.cmk/config"
      register: cmk_profile
      changed_when: false
      check_mode: false
      no_log: true

    - name: Set api_url / api_key / api_secret facts
      ansible.builtin.set_fact:
        cs_api_url: "{{ cmk_profile.stdout | regex_search('(?m)^url=(.*)$', '\\1') | first }}"
        cs_api_key: "{{ cmk_profile.stdout | regex_search('(?m)^apikey=(.*)$', '\\1') | first }}"
        cs_api_secret: "{{ cmk_profile.stdout | regex_search('(?m)^secretkey=(.*)$', '\\1') | first }}"
      no_log: true
      check_mode: false
      changed_when: false

  tasks:
    - name: Require cs_public_key_file to be provided
      ansible.builtin.assert:
        that:
          - cs_public_key_file is defined
          - cs_public_key_file | length > 0
        fail_msg: >-
          cs_public_key_file is unset. Pass the path to the operator's
          public key at apply time, e.g. `-e cs_public_key_file=~/.ssh/id_ed25519.pub`.
        quiet: true

    - name: Register SSH keypair
      ngine_io.cloudstack.ssh_key:
        name: "{{ cs_keypair_name }}"
        public_key: "{{ lookup('file', cs_public_key_file) }}"
        state: present
        api_url: "{{ cs_api_url }}"
        api_key: "{{ cs_api_key }}"
        api_secret: "{{ cs_api_secret }}"

    - name: Ensure isolated network
      ngine_io.cloudstack.network:
        name: "{{ cs_network }}"
        network_offering: "{{ cs_network_offering }}"
        zone: "{{ cs_zone }}"
        state: present
        api_url: "{{ cs_api_url }}"
        api_key: "{{ cs_api_key }}"
        api_secret: "{{ cs_api_secret }}"
      register: cs_network_state

    - name: Allow egress (TCP/UDP/ICMP) on the isolated network
      ngine_io.cloudstack.firewall:
        type: egress
        network: "{{ cs_network }}"
        protocol: "{{ item.proto }}"
        start_port: "{{ item.start | default(omit) }}"
        end_port: "{{ item.end | default(omit) }}"
        icmp_type: "{{ item.icmp_type | default(omit) }}"
        icmp_code: "{{ item.icmp_code | default(omit) }}"
        cidr: 0.0.0.0/0
        zone: "{{ cs_zone }}"
        state: present
        api_url: "{{ cs_api_url }}"
        api_key: "{{ cs_api_key }}"
        api_secret: "{{ cs_api_secret }}"
      loop:
        - { proto: tcp, start: 1, end: 65535 }
        - { proto: udp, start: 1, end: 65535 }
        - { proto: icmp, icmp_type: -1, icmp_code: -1 }

    - name: Ensure build VM
      ngine_io.cloudstack.instance:
        name: "{{ cs_vm_name }}"
        display_name: "{{ cs_vm_name }}"
        service_offering: "{{ cs_service_offering }}"
        template: "{{ cs_template }}"
        zone: "{{ cs_zone }}"
        networks: ["{{ cs_network }}"]
        ssh_key: "{{ cs_keypair_name }}"
        root_disk_size: "{{ cs_vm_root_disk_size_gb }}"
        state: present
        api_url: "{{ cs_api_url }}"
        api_key: "{{ cs_api_key }}"
        api_secret: "{{ cs_api_secret }}"
      register: cs_vm

    # ip_address is idempotent only when pinned to a specific address. First
    # look up any allocated non-sourcenat IP on the network; if absent, allocate.
    - name: Look up existing allocated public IPs on the network
      ansible.builtin.command:
        argv:
          - cmk
          - -p
          - "{{ cs_profile }}"
          - -o
          - json
          - listPublicIpAddresses
          - "associatednetworkid={{ (lookup('pipe', 'cmk -p ' + cs_profile + ' -o json listNetworks name=' + cs_network) | from_json).network[0].id }}"
      register: public_ips_raw
      changed_when: false
      check_mode: false

    - name: Select the non-sourcenat public IP (or empty)
      ansible.builtin.set_fact:
        cs_public_ip: >-
          {{ (public_ips_raw.stdout | from_json).publicipaddress
             | default([])
             | rejectattr('issourcenat', 'equalto', true)
             | map(attribute='ipaddress') | first | default('') }}

    - name: Allocate a public IP if none is pinned yet
      ngine_io.cloudstack.ip_address:
        network: "{{ cs_network }}"
        zone: "{{ cs_zone }}"
        state: present
        api_url: "{{ cs_api_url }}"
        api_key: "{{ cs_api_key }}"
        api_secret: "{{ cs_api_secret }}"
      when: cs_public_ip == ''
      register: new_ip

    - name: Resolve the effective public IP for this network
      ansible.builtin.set_fact:
        cs_public_ip: "{{ cs_public_ip if cs_public_ip != '' else (new_ip.ip_address | default('')) }}"

    - name: Open inbound ports on the public IP
      ngine_io.cloudstack.firewall:
        ip_address: "{{ cs_public_ip }}"
        protocol: tcp
        start_port: "{{ item }}"
        end_port: "{{ item }}"
        cidr: 0.0.0.0/0
        zone: "{{ cs_zone }}"
        state: present
        api_url: "{{ cs_api_url }}"
        api_key: "{{ cs_api_key }}"
        api_secret: "{{ cs_api_secret }}"
      loop: "{{ cs_exposed_ports }}"
      when: cs_public_ip != ''

    - name: Port-forward public ports to the VM
      ngine_io.cloudstack.portforward:
        ip_address: "{{ cs_public_ip }}"
        vm: "{{ cs_vm_name }}"
        protocol: tcp
        public_port: "{{ item }}"
        private_port: "{{ item }}"
        zone: "{{ cs_zone }}"
        state: present
        api_url: "{{ cs_api_url }}"
        api_key: "{{ cs_api_key }}"
        api_secret: "{{ cs_api_secret }}"
      loop: "{{ cs_exposed_ports }}"
      when: cs_public_ip != ''

    - name: Ensure object-storage bucket
      cs_bucket:
        profile: "{{ cs_profile }}"
        name: "{{ cs_bucket }}"
        object_store: "{{ cs_object_store }}"
        quota: "{{ cs_bucket_quota_gb }}"
        state: present

    - name: Fetch bucket credentials
      cs_bucket_credentials:
        profile: "{{ cs_profile }}"
        name: "{{ cs_bucket }}"
      register: bucket_creds
      no_log: true
      check_mode: false
      changed_when: false

    - name: Add the running VM to the ephemeral cks_builders group
      ansible.builtin.add_host:
        name: "{{ cs_vm_name }}"
        groups: cks_builders
        ansible_host: "{{ cs_public_ip }}"
        ansible_user: ubuntu
        ansible_ssh_private_key_file: "{{ cs_public_key_file | regex_replace('\\.pub$', '') }}"
        ansible_ssh_common_args: "-o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o PreferredAuthentications=publickey"
        bucket_access_key: "{{ bucket_creds.access_key }}"
        bucket_secret_key: "{{ bucket_creds.secret_key }}"
        bucket_endpoint: "{{ bucket_creds.endpoint }}"
      changed_when: false
      no_log: true

- name: Configure download server on cks-builder VM
  hosts: cks_builders
  gather_facts: true
  become: true
  vars_files:
    - group_vars/all.yml

  pre_tasks:
    - name: Wait for SSH
      ansible.builtin.wait_for_connection:
        timeout: 300

  tasks:
    - name: Install base packages
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-v2
          - genisoimage
          - jq
          - curl
          - ca-certificates
          - unzip
          - python3
          - containerd
        state: present
        update_cache: true

    - name: Ensure docker + containerd services are running
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: started
      loop: [docker, containerd]

    - name: Register docker.io mirror (mirror.gcr.io) for containerd
      ansible.builtin.copy:
        dest: /etc/containerd/certs.d/docker.io/hosts.toml
        owner: root
        group: root
        mode: "0644"
        content: |
          server = "https://registry-1.docker.io"

          [host."https://mirror.gcr.io"]
            capabilities = ["pull", "resolve"]
      register: containerd_hosts

    - name: Set containerd config_path so the CRI plugin reads certs.d
      ansible.builtin.lineinfile:
        path: /etc/containerd/config.toml
        regexp: '^\s*config_path\s*=\s*".*"'
        line: '    config_path = "/etc/containerd/certs.d"'
        firstmatch: true
      register: containerd_config

    - name: Restart containerd when registry config changed
      ansible.builtin.systemd:
        name: containerd
        state: restarted
      when: containerd_hosts.changed or containerd_config.changed

    - name: Install ctr wrapper so `image pull` reads /etc/containerd/certs.d
      ansible.builtin.copy:
        dest: /usr/local/sbin/ctr
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/bin/bash
          # Containerd 2.x `ctr image pull` ignores config_path; pass --hosts-dir
          # explicitly so mirror.gcr.io fronts docker.io pulls and the CKS
          # builder does not trip Docker Hub's unauthenticated rate limit.
          if [[ "$1" == "image" && "$2" == "pull" ]]; then
            exec /usr/bin/ctr image pull --hosts-dir /etc/containerd/certs.d "${@:3}"
          fi
          exec /usr/bin/ctr "$@"

    - name: Install aws-cli v2 from Amazon
      ansible.builtin.shell: |
        set -euo pipefail
        if command -v aws >/dev/null 2>&1 && aws --version 2>&1 | grep -q 'aws-cli/2'; then
          exit 0
        fi
        tmp=$(mktemp -d)
        curl -fsSL https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip -o "$tmp/aws.zip"
        unzip -q "$tmp/aws.zip" -d "$tmp"
        "$tmp/aws/install" --update
      args:
        creates: /usr/local/bin/aws

    - name: Ensure nginx is NOT masking :80 / :443
      ansible.builtin.systemd:
        name: nginx
        enabled: false
        state: stopped
      failed_when: false

    - name: Create cks-builder directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"
      loop:
        - /opt/cks-builder
        - /opt/cks-builder/output
        - /opt/cks-builder/logs
        - /opt/cks-builder/traefik
        - /opt/cks-builder/traefik/dynamic
        - /opt/cks-builder/traefik/branding

    - name: Install cks build scripts
      ansible.builtin.copy:
        src: "../scripts/{{ item }}"
        dest: "/opt/cks-builder/{{ item }}"
        owner: ubuntu
        group: ubuntu
        mode: "0755"
      loop:
        - build-iso.sh
        - bulk-build.sh
        - sign-artifacts.sh

    - name: Install gpg + ensure ubuntu owns a dedicated signing keyring
      ansible.builtin.apt:
        name: [gpg]
        state: present

    - name: Require atlas_private_key to be provided
      ansible.builtin.assert:
        that:
          - atlas_private_key is defined
          - atlas_private_key | regex_search('-----BEGIN PGP PRIVATE KEY BLOCK-----')
        fail_msg: >-
          atlas_private_key is unset or not a PGP private key block.
          Pass it via ansible-vault / --extra-vars at apply time, e.g.
          `-e @path/to/vault.yml`.
        quiet: true
      no_log: true

    - name: Create GNUPGHOME for the signing keyring
      ansible.builtin.file:
        path: /home/ubuntu/.gnupg-atlas
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0700"

    - name: Check whether Atlas signing key is already imported
      ansible.builtin.command:
        cmd: gpg --list-secret-keys {{ atlas_signing_fingerprint }}
      environment:
        GNUPGHOME: /home/ubuntu/.gnupg-atlas
      become_user: ubuntu
      register: gpg_check
      failed_when: false
      changed_when: false

    - name: Stage Atlas signing key to a 0600 tmpfile
      ansible.builtin.copy:
        dest: /home/ubuntu/.gnupg-atlas/import.asc
        content: "{{ atlas_private_key }}"
        owner: ubuntu
        group: ubuntu
        mode: "0600"
      when: gpg_check.rc != 0
      no_log: true

    - name: Import Atlas signing key from tmpfile
      ansible.builtin.command:
        cmd: gpg --batch --import /home/ubuntu/.gnupg-atlas/import.asc
      environment:
        GNUPGHOME: /home/ubuntu/.gnupg-atlas
      become_user: ubuntu
      when: gpg_check.rc != 0
      register: gpg_import
      changed_when: gpg_import.rc == 0
      # stderr/stdout could echo parts of the armor payload on malformed input
      no_log: true

    - name: Shred the tmpfile after import
      ansible.builtin.file:
        path: /home/ubuntu/.gnupg-atlas/import.asc
        state: absent
      when: gpg_check.rc != 0

    - name: Publish KEY.asc alongside ISOs
      ansible.builtin.command: >-
        aws s3 cp {{ item.src }} s3://{{ cs_bucket }}/cks/{{ item.name }}
        --endpoint-url {{ hostvars[inventory_hostname].bucket_endpoint }}
        --content-type {{ item.ct }}
        --only-show-errors
      environment:
        AWS_ACCESS_KEY_ID: "{{ hostvars[inventory_hostname].bucket_access_key }}"
        AWS_SECRET_ACCESS_KEY: "{{ hostvars[inventory_hostname].bucket_secret_key }}"
      loop:
        - { src: /opt/cks-builder/traefik/branding/KEY.asc, name: KEY.asc, ct: "application/pgp-keys" }
      register: aws_cp_key
      changed_when: aws_cp_key.rc == 0
      no_log: true

    - name: Install bun into /usr/local/bin (for publish-index.ts)
      ansible.builtin.shell: |
        set -e
        if command -v bun >/dev/null 2>&1; then exit 0; fi
        tmp=$(mktemp -d)
        curl -fsSL https://bun.com/install -o "$tmp/install.sh"
        BUN_INSTALL=/usr/local bash "$tmp/install.sh"
        ln -sf /usr/local/bin/bun /usr/local/bin/bunx 2>/dev/null || true
      args:
        creates: /usr/local/bin/bun

    - name: Sync the cks-index TS project onto the VM
      ansible.posix.synchronize:
        src: ../index/
        dest: /opt/cks-builder/cks-index/
        delete: true
        rsync_opts: ["--exclude=node_modules"]
      become: false
      delegate_to: localhost
      vars:
        ansible_ssh_private_key_file: "{{ hostvars[inventory_hostname].ansible_ssh_private_key_file }}"

    - name: Install TS project dependencies with bun
      ansible.builtin.command:
        cmd: bun install --frozen-lockfile --production
        chdir: /opt/cks-builder/cks-index
      environment:
        AGENT: "1"
      register: bun_install
      changed_when: "'packages installed' in bun_install.stdout or 'packages installed' in bun_install.stderr"

    - name: Ensure acme storage directory
      ansible.builtin.file:
        path: /opt/cks-builder/traefik/acme
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Touch acme.json with 0600
      ansible.builtin.copy:
        content: ""
        dest: /opt/cks-builder/traefik/acme/acme.json
        force: false
        owner: root
        group: root
        mode: "0600"

    - name: Install Traefik static config
      ansible.builtin.template:
        src: ../traefik/traefik.yml.j2
        dest: /opt/cks-builder/traefik/traefik.yml
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Install Traefik dynamic routes
      ansible.builtin.template:
        src: ../traefik/download.yml.j2
        dest: /opt/cks-builder/traefik/dynamic/download.yml
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Install docker-compose file
      ansible.builtin.template:
        src: ../traefik/docker-compose.yml.j2
        dest: /opt/cks-builder/traefik/docker-compose.yml
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Install favicon
      ansible.builtin.copy:
        src: ../traefik/branding/favicon.svg
        dest: /opt/cks-builder/traefik/branding/favicon.svg
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Write S3 credentials for s3-gateway (root-readable only)
      ansible.builtin.copy:
        dest: /opt/cks-builder/traefik/s3.env
        owner: root
        group: root
        mode: "0600"
        content: |
          AWS_ACCESS_KEY_ID={{ hostvars[inventory_hostname].bucket_access_key }}
          AWS_SECRET_ACCESS_KEY={{ hostvars[inventory_hostname].bucket_secret_key }}
      no_log: true

    - name: Write build-time credential env
      ansible.builtin.copy:
        dest: /opt/cks-builder/s3-creds.env
        owner: ubuntu
        group: ubuntu
        mode: "0600"
        content: |
          AWS_ACCESS_KEY_ID={{ hostvars[inventory_hostname].bucket_access_key }}
          AWS_SECRET_ACCESS_KEY={{ hostvars[inventory_hostname].bucket_secret_key }}
          AWS_ENDPOINT_URL={{ hostvars[inventory_hostname].bucket_endpoint }}
          BUCKET_NAME={{ cs_bucket }}
      no_log: true

    - name: Bring up download site with docker compose
      community.docker.docker_compose_v2:
        project_src: /opt/cks-builder/traefik
        state: present
        pull: missing
        remove_orphans: true

    - name: Build + publish the static explorer page
      ansible.builtin.shell: |
        set -euo pipefail
        install -d -m 0750 -o ubuntu -g ubuntu /opt/cks-builder/logs
        log=/opt/cks-builder/logs/explorer-publish.log
        cd /opt/cks-builder/index
        { bun run build && bun run publish; } >>"$log" 2>&1
      environment:
        AWS_ACCESS_KEY_ID: "{{ hostvars[inventory_hostname].bucket_access_key }}"
        AWS_SECRET_ACCESS_KEY: "{{ hostvars[inventory_hostname].bucket_secret_key }}"
        AWS_ENDPOINT_URL: "{{ hostvars[inventory_hostname].bucket_endpoint }}"
        BUCKET_NAME: "{{ cs_bucket }}"
      register: explorer_publish
      changed_when: explorer_publish.rc == 0
      failed_when: explorer_publish.rc != 0
      # Credentials flow through the environment above, so redirect stdout /
      # stderr to a log on the VM before no_log hides the task result.
      # Failures: `tail /opt/cks-builder/logs/explorer-publish.log` on the VM.
      no_log: true
