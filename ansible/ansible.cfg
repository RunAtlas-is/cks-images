[defaults]
stdout_callback = yaml
host_key_checking = False
interpreter_python = auto_silent
inventory = ./inventory.yml
retry_files_enabled = False

[ssh_connection]
# Default ansible ssh_args include gssapi-with-mic / hostbased which triggers
# ssh_askpass on systems without Kerberos tickets. Strip to publickey only so
# password and non-interactive flows work on a stock workstation.
ssh_args = -o PreferredAuthentications=publickey -o PasswordAuthentication=no -o ControlMaster=auto -o ControlPersist=60s
