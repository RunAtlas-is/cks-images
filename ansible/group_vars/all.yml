---
# CloudStack target (profile resolves via ~/.cmk/config on the provisioner).
cs_profile: runatlas-internal
cs_zone: is1
cs_service_offering: Atlas.a5
cs_template: Ubuntu 24.04 LTS
cs_keypair_name: cks-builder
# Operator must supply this — path to the public key to register in
# CloudStack. Pass `-e cs_public_key_file=/path/to/key.pub` at apply time.

# Network (created by this playbook if absent).
cs_network: cks-builder-net
cs_network_offering: DefaultIsolatedNetworkOfferingWithSourceNatService

# VM.
cs_vm_name: cks-builder
cs_vm_root_disk_size_gb: 40

# Object storage.
cs_object_store: "Atlas Storage"
cs_bucket: atlas-static-assets
cs_bucket_quota_gb: 50

s3_public_hostname: s3.runatlas.is

# Public download site.
download_hostname: download.runatlas.is
# Role address that receives Let's Encrypt expiry warnings.
letsencrypt_email: monitoring@runatlas.is
docs_url: https://docs.runatlas.is/Atlas+Docs/Tutorials/Deploying+Kubernetes+on+Atlas

# GPG signing for CKS artifacts. The private key material itself
# (`atlas_private_key`) must be supplied externally — e.g. via an
# ansible-vault file passed with `--extra-vars @path/to/vault.yml`.
atlas_signing_fingerprint: 4C2D72FDDEF77A5CC4A7D2C421CA4588DCB6991E
atlas_signing_uid: artifacts@runatlas.is

# Ports to expose on the VM via CloudStack NAT.
cs_exposed_ports: [22, 80, 443]
